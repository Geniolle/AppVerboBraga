<section id="create-user-card" class="card entity-panel-card" data-menu-scope="administrativo,meu_perfil,funcionarios,financeiro,relatorios,links,tutorial" data-admin-user-create-card="1">
            {% if success %}
              <div class="alert ok">{{ success }}</div>
            {% endif %}

            <div class="entity-create-toolbar">
            <details id="create-user-collapse" class="entity-create-collapse" {% if errors %}open{% endif %}>
              <summary class="appverbo-subprocess-create-trigger-v1">
                <span>Criar utilizador</span>
              </summary>
              <div class="entity-create-body">
                {% if errors %}
                  <div class="alert error">
                    <ul>
                      {% for error in errors %}
                        <li>{{ error }}</li>
                      {% endfor %}
                    </ul>
                  </div>
                {% endif %}

                <div class="admin-subsection">
                  <form id="create-user-form" method="post" action="/users/new">
                    <div class="grid">
                      <div class="field">
                        <label for="full_name">Nome completo *</label>
                        <input id="full_name" name="full_name" required value="{{ form_data.full_name }}">
                      </div>
                      <div class="field">
                        <label for="primary_phone">Telefone principal *</label>
                        <input id="primary_phone" name="primary_phone" required value="{{ form_data.primary_phone }}">
                      </div>
                      <div class="field">
                        <label for="email">Email *</label>
                        <input id="email" name="email" type="email" required value="{{ form_data.email }}">
                      </div>
                      <div class="field">
                        <label for="create_user_status">Estado da conta</label>
                        <input id="create_user_status" value="pendente (convite enviado por email)" readonly disabled class="readonly-field">
                      </div>
                      <div class="field">
                        <label for="entity_id">Entidade *</label>
                        <select id="entity_id" name="entity_id" required>
                          <option value="">Selecionar entidade</option>
                          {% for entity in entities %}
                            <option value="{{ entity.id }}" {% if form_data.entity_id == entity.id|string %}selected{% endif %}>
                              {{ entity.name }}
                            </option>
                          {% endfor %}
                        </select>
                      </div>
                      <div class="field full">
                        <label for="profile_id">Perfil global *</label>
                        <select id="profile_id" name="profile_id" required>
                          <option value="">Selecionar perfil</option>
                          {% for profile in profiles %}
                            <option value="{{ profile.id }}" {% if form_data.profile_id == profile.id|string %}selected{% endif %}>
                              {{ profile.name }}
                            </option>
                          {% endfor %}
                        </select>
                      </div>
                    </div>
                    <div class="form-action-row">
                      <button type="submit" name="invite_delivery" value="email" class="action-btn">Enviar convite</button>
                      <button
                        type="button"
                        class="action-btn-cancel"
                        data-card-cancel-close="1"
                      >Cancelar</button>
                    </div>
                  </form>
                </div>
              </div>
            </details>
            <button
              id="create-user-generate-link-shortcut-btn"
              type="button"
              class="action-btn-secondary entity-create-link-shortcut"
            >Gerar link</button>
            <div class="entity-create-link-slot" aria-live="polite">
              {% if generated_invite_link %}
              <div class="entity-create-link-output">
                <input
                  id="generated-invite-link-input"
                  type="text"
                  class="readonly-field"
                  value="{{ generated_invite_link }}"
                  readonly
                >
                <button
                  id="generated-invite-link-copy-btn"
                  type="button"
                  class="action-btn-secondary entity-create-link-copy-btn"
                  data-copy-target="generated-invite-link-input"
                >Copiar</button>
              </div>
              {% endif %}
            </div>
            </div>
        </section>
