{% macro render_configurable_items_pagination_footer(page_size_attr, pagination_attr, page_size_id=none, include_options=true) %}
<div class="appgenesis-load-more-footer-v1 configurable-items-pagination-footer-v1">
  <div class="appgenesis-load-more-page-size-v1">
    <select{% if page_size_id %} id="{{ page_size_id }}"{% endif %} {{ page_size_attr }}>
      {% if include_options %}
      <option value="5" selected>5</option>
      <option value="10">10</option>
      <option value="20">20</option>
      {% endif %}
    </select>
    <span>entradas por página</span>
  </div>
  <div class="appgenesis-load-more-status-v1" {{ pagination_attr }}></div>
</div>
{% endmacro %}
