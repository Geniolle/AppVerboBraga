{% extends "base.html" %}

{% block title %}Nova palavra-passe{% endblock %}

{% block head_extra %}
  <link rel="stylesheet" href="/static/css/login.css?v=20260425a">
{% endblock %}

{% block body %}
  <main class="card">
    <h1>Nova palavra-passe</h1>

    {% if success %}
      <div class="alert ok">{{ success }}</div>
    {% endif %}
    {% if error %}
      <div class="alert error">{{ error }}</div>
    {% endif %}

    {% if token %}
      <form method="post" action="/password/reset">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="field">
          <label for="password">Nova palavra-passe</label>
          <input id="password" name="password" type="password" minlength="8" required placeholder="Minimo 8 caracteres">
        </div>

        <div class="field">
          <label for="confirm_password">Confirmar palavra-passe</label>
          <input id="confirm_password" name="confirm_password" type="password" minlength="8" required placeholder="Repita a palavra-passe">
        </div>

        <button class="primary-btn" type="submit">Guardar nova palavra-passe</button>
      </form>
    {% endif %}

    <p class="switch-mode">
      <a href="/login">Voltar ao login</a>
    </p>
  </main>
{% endblock %}
