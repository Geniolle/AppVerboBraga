services:
  db:
    image: postgres:16-alpine
    container_name: appverbobraga-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_igreja}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_igreja"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: appverbobraga-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app_igreja}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-this-in-production}
      ADMIN_LOGIN_EMAIL: ${ADMIN_LOGIN_EMAIL:-admin@appverbo.local}
      ADMIN_PROFILE_NAMES: ${ADMIN_PROFILE_NAMES:-admin,administrador}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    ports:
      - "8000:8000"
    command: sh -c "python init_db.py && uvicorn web_app:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/app

volumes:
  pg_data:
