services:
  db:
    image: postgres:16-alpine
    container_name: appgenesis-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_igreja}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app_igreja}"]
      interval: 1s
      timeout: 3s
      start_period: 1s
      retries: 20

  web:
    build: .
    container_name: appgenesis-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_BASE_URL: ${APP_BASE_URL:-http://web:8000}
      SELENIUM_REMOTE_URL: ${SELENIUM_REMOTE_URL:-http://selenium:4444/wd/hub}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app_igreja}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_TIMEOUT_SECONDS: ${DB_POOL_TIMEOUT_SECONDS:-30}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      DB_POOL_PRE_PING: ${DB_POOL_PRE_PING:-1}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-this-in-production}
      ADMIN_LOGIN_EMAIL: ${ADMIN_LOGIN_EMAIL:-admin@appgenesis.local}
      ADMIN_PROFILE_NAMES: ${ADMIN_PROFILE_NAMES:-admin,administrador}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    ports:
      - "8000:8000"
    command: sh -c "python init_db.py && uvicorn web_app:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/app

  selenium:
    image: selenium/standalone-chromium:4.46.0-20260707
    profiles:
      - browser-tests
    shm_size: "2gb"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:4444/status
      interval: 3s
      timeout: 3s
      retries: 30

volumes:
  pg_data:
