[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    ".venv",
    "__pycache__",
    ".pytest_cache",
    "backups",
    "appverbo_runtime_logs",
    "migrations"
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "W",
    "I"
]
ignore = [
    "E501"
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
