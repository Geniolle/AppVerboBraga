name: CI
on:
  push:
    branches: [master, refactor/appgenesis-process-architecture]
  pull_request:
    branches: [master]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==9.1.1 pyflakes==3.4.0
          pip install -e .
      - name: Lint with pyflakes (informational)
        # Non-blocking: appgenesis/models/*.py uses SQLAlchemy string-based
        # relationship() forward refs that pyflakes reports as false-positive
        # "undefined name", plus pre-existing "imported but unused" noise.
        # Kept as a visible report, not a merge gate, until that baseline is
        # cleaned up separately.
        continue-on-error: true
        run: python -m pyflakes appgenesis/ web_app.py
      - name: Run tests (excluding Selenium browser tests)
        run: |
          pytest -q \
            --ignore=tests/test_auth_objeto_navigation_selenium.py \
            --ignore=tests/test_estruturas_menu_client_navigation.py \
            --ignore=tests/test_navigation_refresh_home.py \
            --ignore=tests/test_navigation_reload_and_loading_overlay.py \
            --ignore=tests/test_admin_target_registry_stage2_browser.py \
            --ignore=tests/test_menu_move_diagnostic_browser.py \
            --ignore=tests/test_process_cards_visibility_stage5_browser.py \
            --ignore=tests/test_process_keys_registry_stage1_browser.py \
            --ignore=tests/test_process_lists_columns_editor.py \
            --ignore=tests/test_process_lists_reusable_create.py \
            --ignore=tests/test_process_menu_config_builder_stage3_browser.py \
            --ignore=tests/test_process_menu_runtime_stage7_browser.py \
            --ignore=tests/test_process_navigation_state_stage4_browser.py \
            --ignore=tests/test_process_submenu_runtime_stage6_browser.py
      - name: Run Selenium browser tests in Docker
        run: |
          docker compose --profile browser-tests up -d --build db web selenium
          until docker compose exec -T selenium curl -fsS http://localhost:4444/status >/dev/null; do
            sleep 2
          done
          until docker compose exec -T web python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000')"; do
            sleep 2
          done
          docker compose exec -T web sh -lc "python -m pip install pytest==9.1.1 'selenium>=4.45.0,<5.0' && pytest -q \
            tests/test_admin_target_registry_stage2_browser.py \
            tests/test_auth_objeto_navigation_selenium.py \
            tests/test_auth_objeto_processo_list_diagnostic_browser.py \
            tests/test_estruturas_menu_client_navigation.py \
            tests/test_menu_move_diagnostic_browser.py \
            tests/test_navigation_refresh_home.py \
            tests/test_navigation_reload_and_loading_overlay.py \
            tests/test_process_additional_fields_list_dropdown_browser.py \
            tests/test_process_cards_visibility_stage5_browser.py \
            tests/test_process_keys_registry_stage1_browser.py \
            tests/test_process_lists_reusable_create.py \
            tests/test_process_menu_config_builder_stage3_browser.py \
            tests/test_process_menu_runtime_stage7_browser.py \
            tests/test_process_navigation_state_stage4_browser.py \
            tests/test_process_submenu_runtime_stage6_browser.py \
            tests/test_process_editor_stay_after_save_cancel.py"
